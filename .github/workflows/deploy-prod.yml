name: Build and Deploy to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/socket-server/**'
      - 'apps/web/**'
      - 'libs/**'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build Docker image (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, socket, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "lower=${IMAGE_OWNER,,}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/sallycards-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/sallycards-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Hetzner VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/apps/sallycards-backoffice
            git fetch --all
            git reset --hard origin/main
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -af --filter "until=72h"

  cloudflare-purge:
    name: Purge Cloudflare cache
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ secrets.CF_ZONE_ID != '' }}
    steps:
      - run: |
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  health-check:
    name: Verify deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for services
        run: sleep 30
      - name: Check API health
        run: curl -fsS https://api.salistar.com/api/v1/health || echo "API not yet reachable"
      - name: Check Socket health
        run: curl -fsS https://ws.salistar.com/health || echo "Socket not yet reachable"
      - name: Check Web
        run: curl -fsS -I https://sallycards.salistar.com || echo "Web not yet reachable"
