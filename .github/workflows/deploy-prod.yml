name: Build and Deploy to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/socket-server/**'
      - 'apps/web/**'
      - 'libs/**'
      - 'docker/**'
      - 'docker/redis-auth-proxy/**'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build Docker image (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            dockerfile: docker/api.Dockerfile
          - service: socket
            context: .
            dockerfile: docker/socket.Dockerfile
          - service: web
            context: .
            dockerfile: docker/web.Dockerfile
          - service: redis-auth-proxy
            context: docker/redis-auth-proxy
            dockerfile: docker/redis-auth-proxy/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "lower=${IMAGE_OWNER,,}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/sallycards-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/sallycards-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy 5-service stack to Hetzner VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/apps/sallycards-backoffice

            echo "==> Sync code from GitHub"
            git fetch --all
            git reset --hard origin/main

            echo "==> Login to ghcr.io"
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pull all 5 service images (api, socket, web from ghcr.io + mongo, redis from Docker Hub)"
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml pull

            echo "==> Bring up complete stack (mongo + redis + api + socket + web)"
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Wait for healthchecks"
            sleep 15
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml ps

            echo "==> Cleanup unused images (keep last 72h)"
            docker image prune -af --filter "until=72h"

            echo "==> Final state"
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml ps --format json | head -20

  cloudflare-purge:
    name: Purge Cloudflare cache
    needs: deploy
    runs-on: ubuntu-latest
    env:
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - name: Purge cache (skip if secrets missing)
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "Cloudflare secrets missing, skipping cache purge"
            exit 0
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  health-check:
    name: Verify deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for services
        run: sleep 30
      - name: Check API health
        run: curl -fsS https://api.salistar.com/api/v1/health || echo "API not yet reachable"
      - name: Check Socket health
        run: curl -fsS https://ws.salistar.com/health || echo "Socket not yet reachable"
      - name: Check Web
        run: curl -fsS -I https://sallycards.salistar.com || echo "Web not yet reachable"
