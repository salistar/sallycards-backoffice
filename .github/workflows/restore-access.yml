##############################################################################
# ONE-SHOT — Restauration d'accès SSH au serveur 1 (sallycards-prod)
#
# Ajoute (APPEND, non destructif) une nouvelle cle publique aux
# authorized_keys du user 'deploy'. La cle SallyCards existante est
# CONSERVEE (le CI SallyCards continue de fonctionner). Aucune donnee
# ni service SallyCards modifie.
##############################################################################
name: Restore SSH access (server1)

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-22.04
    steps:
      - name: SSH append cle publique
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            NEWKEY='ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKKe2ZDhBTL4Rzk0zr3q2x6T2tYiF1uWEgKM+yZZW/Jc sallycards-prod-restore'
            mkdir -p ~/.ssh
            touch ~/.ssh/authorized_keys
            chmod 700 ~/.ssh; chmod 600 ~/.ssh/authorized_keys
            echo "Cible: $(whoami)@$(hostname)"
            echo "Cles AVANT: $(wc -l < ~/.ssh/authorized_keys)"
            if grep -qF "sallycards-prod-restore" ~/.ssh/authorized_keys; then
              echo "Cle de restauration deja presente (idempotent) - rien a faire"
            else
              printf '%s\n' "$NEWKEY" >> ~/.ssh/authorized_keys
              echo "Cle de restauration AJOUTEE (append)"
            fi
            echo "Cles APRES: $(wc -l < ~/.ssh/authorized_keys)"
            echo "Empreintes autorisees:"
            ssh-keygen -lf ~/.ssh/authorized_keys 2>/dev/null || true
            echo "RESTORE OK - cle SallyCards conservee, nouvelle cle ajoutee"
