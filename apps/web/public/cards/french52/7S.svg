<svg width="200" height="280" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background -->
  <rect width="200" height="280" fill="white" stroke="#999" stroke-width="2" rx="8"/>
  
  <!-- Top-left corner: value and suit -->
  <text x="10" y="30" font-size="24" font-weight="bold" fill="#000000" font-family="Arial, sans-serif">7</text>
  <text x="10" y="50" font-size="28" fill="#000000" font-family="Arial, sans-serif">♠</text>
  
  <!-- Center: large suit symbol -->
  <text x="100" y="160" font-size="120" fill="#000000" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" opacity="0.3">♠</text>
  
  <!-- Bottom-right corner: value and suit (rotated perspective) -->
  <g transform="translate(190, 270) rotate(180)">
    <text x="0" y="0" font-size="24" font-weight="bold" fill="#000000" font-family="Arial, sans-serif">7</text>
    <text x="0" y="20" font-size="28" fill="#000000" font-family="Arial, sans-serif">♠</text>
  </g>
</svg>