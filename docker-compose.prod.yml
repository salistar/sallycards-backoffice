# docker-compose.prod.yml — overrides pour déploiement Hetzner + Cloudflare Tunnel
#
# Utilisation :
#   docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Note : !reset [] vide la liste des ports du fichier base (sinon Docker concatène).
# Cloudflare Tunnel se connecte sur 127.0.0.1, donc pas besoin d'exposer publiquement.

services:
  sallycards-mongo:
    ports: !reset []
    volumes:
      - mongo-data:/data/db
    restart: always

  sallycards-redis:
    ports: !reset []
    restart: always

  sallycards-api:
    image: ghcr.io/salistar/sallycards-api:latest
    build: !reset null
    pull_policy: always
    ports: !override
      - '127.0.0.1:3000:3000'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sallycards-socket:
    image: ghcr.io/salistar/sallycards-socket:latest
    build: !reset null
    pull_policy: always
    ports: !override
      - '127.0.0.1:3001:3001'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sallycards-web:
    image: ghcr.io/salistar/sallycards-web:latest
    build: !reset null
    pull_policy: always
    ports: !override
      - '127.0.0.1:4000:3000'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sallycards-nginx:
    profiles: ['never']

  sallycards-turn:
    profiles: ['never']

  # ─── Mongo Express (admin web UI) ──────────────────────────
  # Activé en prod, exposé via Cloudflare Tunnel sur mongo.salistar.com
  # avec auth Basic + protection Cloudflare WAF
  mongo-express:
    profiles: !reset []
    ports: !override
      - '127.0.0.1:8083:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@sallycards-mongo:27017/
      ME_CONFIG_BASICAUTH: 'true'
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
      ME_CONFIG_SITE_BASEURL: '/'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

  # ─── Redis Commander (admin web UI) ────────────────────────
  # Activé en prod, exposé via Cloudflare Tunnel sur redis.salistar.com
  # Note : env vars HTTP_USER/HTTP_PASSWORD ignorées dans cette image,
  # on passe l'auth via command line
  redis-commander:
    profiles: !reset []
    ports: !override
      - '127.0.0.1:8082:8081'
    environment:
      REDIS_HOSTS: local:sallycards-redis:6379
    command:
      - --redis-host
      - sallycards-redis
      - --http-auth-username
      - ${REDIS_COMMANDER_USER}
      - --http-auth-password
      - ${REDIS_COMMANDER_PASSWORD}
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'
