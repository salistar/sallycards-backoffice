# docker-compose.prod.yml — overrides pour déploiement Hetzner + Cloudflare Tunnel
#
# Utilisation :
#   docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Note : !reset [] vide la liste des ports du fichier base (sinon Docker concatène).
# Cloudflare Tunnel se connecte sur 127.0.0.1, donc pas besoin d'exposer publiquement.

services:
  sallycards-mongo:
    ports: !reset []
    volumes:
      - mongo-data:/data/db
    restart: always

  sallycards-redis:
    ports: !reset []
    restart: always

  sallycards-api:
    image: ghcr.io/salistar/sallycards-api:latest
    build: !reset null
    pull_policy: always
    ports: !override
      - '127.0.0.1:3000:3000'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sallycards-socket:
    image: ghcr.io/salistar/sallycards-socket:latest
    build: !reset null
    pull_policy: always
    ports: !override
      - '127.0.0.1:3001:3001'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sallycards-web:
    image: ghcr.io/salistar/sallycards-web:latest
    build: !reset null
    pull_policy: always
    ports: !override
      - '127.0.0.1:4000:3000'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sallycards-nginx:
    profiles: ['never']

  sallycards-turn:
    profiles: ['never']
