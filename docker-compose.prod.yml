# docker-compose.prod.yml — overrides pour déploiement Hetzner + Cloudflare Tunnel
#
# Utilisation :
#   docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  sallycards-mongo:
    ports: []
    volumes:
      - mongo-data:/data/db
    restart: always

  sallycards-redis:
    ports: []
    restart: always

  sallycards-api:
    image: ghcr.io/salistar/sallycards-api:latest
    build: null
    pull_policy: always
    ports:
      - '127.0.0.1:3000:3000'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sallycards-socket:
    image: ghcr.io/salistar/sallycards-socket:latest
    build: null
    pull_policy: always
    ports:
      - '127.0.0.1:3001:3001'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sallycards-web:
    image: ghcr.io/salistar/sallycards-web:latest
    build: null
    pull_policy: always
    ports:
      - '127.0.0.1:4000:3000'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sallycards-nginx:
    profiles: ['never']

  sallycards-turn:
    profiles: ['never']
