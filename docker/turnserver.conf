# Coturn TURN server configuration for SallyCards
# https://github.com/coturn/coturn

# Listener port for TURN/STUN
listening-port=3478

# Realm and server name
realm=sallycards.com
server-name=sallycards.com

# Use long-term credential mechanism
lt-cred-mech

# ── Auth par shared-secret HMAC (REST API coturn) ────────────────────────
# C'est le mécanisme utilisé par l'API SallyCards (/api/turn-creds) qui génère
# des credentials tournants : username="<expiry>:<userId>", credential=
# base64(HMAC-SHA1(username, static-auth-secret)).
# IMPORTANT : `static-auth-secret` DOIT être identique à TURN_SECRET de l'API.
# Pour tourner le secret en prod : changer ici ET TURN_SECRET dans .env.production.
use-auth-secret
static-auth-secret=9f3c1a7e8b2d4056af1c93e6720d8b45e1a7c0f2d6b394817c5e0a2f4d8b6019

# Security: disallow loopback and multicast peers
no-loopback-peers
no-multicast-peers

# Fingerprint for TURN messages
fingerprint

# Log to stdout for Docker
log-file=stdout

# Disable CLI (not needed in Docker)
no-cli
