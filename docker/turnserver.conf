# Coturn TURN server configuration for SallyCards
# https://github.com/coturn/coturn

# Listener port for TURN/STUN
listening-port=3478

# Realm and server name
realm=sallycards.com
server-name=sallycards.com

# Use long-term credential mechanism
lt-cred-mech

# User credentials for TURN authentication
# Add users in the format: user=username:password
# Example:
#   user=sallycards:your-secure-password-here
#
# For production, set credentials via environment variables or
# use the turnadmin CLI tool to manage users:
#   turnadmin -a -u username -p password -r sallycards.com

# Dev user (local / LAN)
user=sallycards:sallycards_dev_turn_2026

# Security: disallow loopback and multicast peers
no-loopback-peers
no-multicast-peers

# Fingerprint for TURN messages
fingerprint

# Log to stdout for Docker
log-file=stdout

# Disable CLI (not needed in Docker)
no-cli
